name: Pipeline Compose Export
description: Upload pipeline-compose stage outputs as an artifact for the run orchestrator
branding:
  icon: upload
  color: blue
inputs:
  stage_id:
    description: Stage id (artifact becomes pipeline-compose-<stage_id>)
    required: true
  outputs:
    description: JSON object of stage output keys and values
    required: true
  validate_schema:
    description: When true, validate outputs against context_schema_json before upload
    required: false
    default: 'false'
  context_schema_json:
    description: JSON Schema object (root type object with per-stage properties)
    required: false
runs:
  using: node24
  main: dist/index.js
